# Use vim keybindings in copy/view mode
setw -g mode-keys vi

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Interactive resize mode
bind-key r switch-client -T resize

bind-key -T resize -r Up resize-pane -U 5
bind-key -T resize -r Down resize-pane -D 5
bind-key -T resize -r Left resize-pane -L 5
bind-key -T resize -r Right resize-pane -R 5

# Copy mode clipboard integration
# Enter copy mode with prefix+[
# Use 'v' to begin selection, 'y' to copy to system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Slow down mouse scroll (2 lines at a time)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# Rename current pane (prefix + T)
bind-key T command-prompt -p "Pane title:" 'select-pane -T "%%"'

# Pane border colors (Rose Pine Dawn)
set -g pane-active-border-style fg=#b4637a
set -g pane-border-style fg=#9893a5

# Status bar colors (Rose Pine Dawn)
set -g status-style bg=#9893a5,fg=#faf4ed
set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}"#{=20:pane_title}" %H:%M %d-%b-%y'
set -g status-right-length 80

# Show pane titles on borders
set -g pane-border-status top
set -g pane-border-format "#[align=centre] #T "

# Show pane numbers longer (default 500ms)
set -g display-panes-time 1500

# Enable mouse support for easier selection
set -g mouse on

# Allow terminal passthrough (for Ghostty hyperlinks, images, etc.)
set -g allow-passthrough on
set -as terminal-features ',xterm-256color:hyperlinks'

# Pass window title to Ghostty
set -g set-titles on
set -g set-titles-string "#{pane_current_path}"

